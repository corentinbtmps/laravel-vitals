name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*']
        include:
          - php: '8.4'
            laravel: '13.*'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sqlite3, xml, dom, curl, zip
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        run: |
          composer require "illuminate/contracts=${{ matrix.laravel }}" "illuminate/database=${{ matrix.laravel }}" "illuminate/support=${{ matrix.laravel }}" --no-interaction --no-update
          # Re-assert after the require rewrite: laravel/framework 11.x (a dev-only
          # transitive dep via testbench/pest-plugin-laravel) only has advisory-flagged
          # releases, which Composer blocks during resolution. This library ships no
          # framework, so disable advisory version-blocking for the CI matrix only.
          composer config --no-plugins --json policy.advisories.block false 2>/dev/null || true
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest --no-coverage

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  rector:
    name: Rector
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Rector
        run: vendor/bin/rector process --dry-run

  assets:
    name: Build assets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f dist/dashboard.css || (echo "Missing dist/dashboard.css" && exit 1)
          test -f dist/dashboard.js  || (echo "Missing dist/dashboard.js" && exit 1)
